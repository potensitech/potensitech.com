baseURL = "https://phone.potensitech.com/"
languageCode = "en-us"
title = "PhoneTech"
theme = "pehtheme-hugo"
paginate = "6"
summaryLength = "20"
googleAnalytics = "G-MEASUREMENT_ID"
telephone = "+1-555-123-4567"
address = "1234 Elm Street, Springfield, IL 62704, USA"
email = "potensitech@gmail.com"
areaServed = "Worldwide"
currency = "USD"

[permalinks]
post = "/:slug/"
page = "/:slug/"
category = "/:slug/"

# MARKUP CONFIGURATION
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
      hardWraps = false
      xhtml = false
    [markup.goldmark.parser]
      autoHeadingID = true
      autoHeadingIDType = "github"
      wrapStandAloneImageWithinParagraph = false
      [markup.goldmark.parser.attribute]
        title = true
        block = true
    [markup.goldmark.extensions]
      definitionList = true
      footnote = true
      linkify = true
      linkifyProtocol = "https"
      strikethrough = true
      table = true
      taskList = true
      typographer = true

# HIGHLIGHT CONFIGURATION
[markup.highlight]
  style = "github"
  lineNos = false
  codeFences = true
  guessSyntax = false
  hl_Lines = ""
  lineNumbersInTable = false
  noClasses = false
  tabWidth = 2

# TABLE OF CONTENTS CONFIGURATION
[markup.tableOfContents]
  startLevel = 2
  endLevel = 6
  ordered = true

[params.toc]
  enable = true
  title = "Table of Contents:" 
  numbering = true
  minHeadings = 2

[params]
logo = "/favicon.png"
featuredCategory = ""
description = "PhoneTech is a blog covering news, tips, reviews, and the latest updates about mobile phones and mobile technology. Discover smartphone recommendations, tutorials, and the newest gadget updates here."
footerTagline = "Your Trusted Mobile Technology Reference"
footerDescription = "PhoneTech is committed to delivering accurate, useful, and inspiring information about mobile phones. We provide reviews, tips, and the latest news in mobile technology."
showAttribution = false
copyrightName = "Potensitech"
copyrightLink = "https://phone.potensitech.com"

[related]
